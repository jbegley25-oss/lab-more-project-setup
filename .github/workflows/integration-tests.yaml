name: integration-tests

on:
  push:
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install .

      - name: Run integration test
        run: |
          pirate-chat <<'EOF'
          I am bob.
          What is my name?
          EOF
